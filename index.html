<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nakshatra AI — Cosmic Readings</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void: #09070F; --deep: #110D20; --veil: #1C1630;
    --gold: #C9A84C; --gold-pale: #E8D5A0; --silver: #A8B8CC;
    --glow: #7B5EA7; --rose: #C97B84; --text: #D8CFC4; --muted: #6E6780;
    --font-display: 'Cormorant Garamond', serif; --font-body: 'DM Sans', sans-serif;
  }
  body { background: var(--void); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .app { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 0 20px 60px; }
  header { text-align: center; padding: 52px 0 36px; }
  .mandala { width: 72px; height: 72px; margin: 0 auto 20px; animation: spin 40s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .site-name { font-family: var(--font-display); font-size: 2.6rem; font-weight: 300; letter-spacing: 0.12em; color: var(--gold-pale); text-transform: uppercase; }
  .site-tagline { font-size: 0.78rem; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; margin-top: 6px; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 32px 0; opacity: 0.35; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider span { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.2em; }
  .card { background: linear-gradient(145deg, var(--deep), var(--veil)); border: 1px solid rgba(201,168,76,0.18); border-radius: 16px; padding: 32px 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); margin-bottom: 20px; }
  .card-title { font-family: var(--font-display); font-size: 1.35rem; color: var(--gold-pale); margin-bottom: 6px; }
  .card-subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--silver); }
  input, textarea { background: rgba(255,255,255,0.04); border: 1px solid rgba(168,184,204,0.2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: var(--font-body); font-size: 0.88rem; width: 100%; outline: none; }
  input:focus, textarea:focus { border-color: rgba(201,168,76,0.5); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .lang-toggle { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .lang-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid rgba(168,184,204,0.2); font-size: 0.78rem; cursor: pointer; background: transparent; color: var(--silver); font-family: var(--font-body); }
  .lang-btn.active { background: rgba(123,94,167,0.2); border-color: var(--glow); color: #C8B0E8; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .pill { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(168,184,204,0.2); font-size: 0.76rem; cursor: pointer; background: transparent; color: var(--silver); font-family: var(--font-body); }
  .pill.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 0; border-top: 1px solid rgba(168,184,204,0.08); margin-top: 6px; }
  .toggle-label { font-size: 0.78rem; color: var(--silver); }
  .toggle-label small { display: block; font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .switch { position: relative; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 24px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(168,184,204,0.2); }
  .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: 0.3s; }
  input:checked + .slider { background: rgba(201,168,76,0.25); border-color: var(--gold); }
  input:checked + .slider::before { transform: translateX(20px); background: var(--gold); }
  .btn-cosmic { width: 100%; margin-top: 22px; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #7B5EA7 0%, #C9A84C 100%); color: #fff; font-family: var(--font-body); font-size: 0.88rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn-cosmic:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading-ring { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: ring 0.7s linear infinite; margin: 0 auto; }
  @keyframes ring { to { transform: rotate(360deg); } }
  .response-card { display: none; background: linear-gradient(145deg, var(--deep), var(--veil)); border: 1px solid rgba(201,168,76,0.22); border-radius: 16px; padding: 32px 28px; margin-top: 20px; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .response-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(201,168,76,0.12); }
  .response-planet { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--glow), var(--rose)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .response-meta { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }
  .response-type { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold-pale); }
  .response-body { font-size: 0.92rem; line-height: 1.85; color: var(--text); }
  .response-body strong { color: var(--gold-pale); }
  .response-body em { color: var(--silver); font-style: italic; }
  .dasha-section { margin-top: 24px; padding-top: 22px; border-top: 1px solid rgba(201,168,76,0.12); }
  .dasha-title { font-family: var(--font-display); font-size: 1.05rem; color: var(--gold-pale); margin-bottom: 14px; }
  .dasha-body { font-size: 0.88rem; line-height: 1.85; color: var(--text); }
  .dasha-body strong { color: var(--gold-pale); }
  .error-msg { display: none; background: rgba(201,120,132,0.1); border: 1px solid rgba(201,120,132,0.3); border-radius: 8px; padding: 12px 16px; font-size: 0.82rem; color: #e0a0a8; margin-top: 14px; }
  footer { text-align: center; padding-top: 48px; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  @media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } .site-name { font-size: 2rem; } .card { padding: 22px 18px; } }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="app">
  <header>
    <svg class="mandala" viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="34" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
      <circle cx="36" cy="36" r="28" stroke="#C9A84C" stroke-width="0.4" opacity="0.3"/>
      <circle cx="36" cy="36" r="6" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
      <g opacity="0.6">
        <line x1="36" y1="2" x2="36" y2="14" stroke="#C9A84C" stroke-width="0.8"/>
        <line x1="36" y1="58" x2="36" y2="70" stroke="#C9A84C" stroke-width="0.8"/>
        <line x1="2" y1="36" x2="14" y2="36" stroke="#C9A84C" stroke-width="0.8"/>
        <line x1="58" y1="36" x2="70" y2="36" stroke="#C9A84C" stroke-width="0.8"/>
        <line x1="12" y1="12" x2="20" y2="20" stroke="#C9A84C" stroke-width="0.6"/>
        <line x1="52" y1="52" x2="60" y2="60" stroke="#C9A84C" stroke-width="0.6"/>
        <line x1="60" y1="12" x2="52" y2="20" stroke="#C9A84C" stroke-width="0.6"/>
        <line x1="20" y1="52" x2="12" y2="60" stroke="#C9A84C" stroke-width="0.6"/>
      </g>
      <circle cx="36" cy="8" r="2" fill="#C9A84C" opacity="0.7"/>
      <circle cx="36" cy="64" r="2" fill="#C9A84C" opacity="0.7"/>
      <circle cx="8" cy="36" r="2" fill="#C9A84C" opacity="0.7"/>
      <circle cx="64" cy="36" r="2" fill="#C9A84C" opacity="0.7"/>
    </svg>
    <div class="site-name">Nakshatra AI</div>
    <div class="site-tagline">Vedic · Natal · Cosmic Guidance</div>
  </header>
  <div class="divider"><span>✦</span></div>
  <div class="card">
    <div class="card-title">Your Cosmic Reading</div>
    <div class="card-subtitle">Share your birth details and ask what the stars reveal.</div>
    <div class="field-row">
      <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="Your name"/></div>
      <div class="field"><label>Date of Birth</label><input type="date" id="dob"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Time of Birth</label><input type="time" id="tob"/></div>
      <div class="field"><label>Place of Birth</label><input type="text" id="pob" placeholder="City, Country"/></div>
    </div>
    <div class="field-row">
      <div class="field full">
        <label>Language Preference</label>
        <div class="lang-toggle" id="langGroup">
          <button class="lang-btn active" data-lang="English">🇬🇧 English</button>
          <button class="lang-btn" data-lang="Hindi">🇮🇳 हिंदी</button>
          <button class="lang-btn" data-lang="Hinglish">✨ Hinglish</button>
          <button class="lang-btn" data-lang="Sanskrit-flavoured English">🕉️ Sanskrit Style</button>
        </div>
      </div>
    </div>
    <div class="field-row">
      <div class="field full">
        <label>Reading Type</label>
        <div class="pill-group" id="pillGroup">
          <button class="pill active" data-type="General Life Reading">🔭 General</button>
          <button class="pill" data-type="Career & Dharma">💼 Career</button>
          <button class="pill" data-type="Love & Relationships">❤️ Love</button>
          <button class="pill" data-type="Health & Vitality">🌿 Health</button>
          <button class="pill" data-type="Finance & Wealth">💰 Wealth</button>
          <button class="pill" data-type="Spiritual Path">🕉️ Spiritual</button>
        </div>
      </div>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">🪐 Include Dasha Analysis<small>Current Mahadasha, Antardasha & their life impacts</small></div>
      <label class="switch"><input type="checkbox" id="dashaToggle" checked><span class="slider"></span></label>
    </div>
    <div class="field-row" style="margin-top:14px;">
      <div class="field full"><label>Your Question (optional)</label><textarea id="question" placeholder="Ask something specific..."></textarea></div>
    </div>
    <button class="btn-cosmic" id="readBtn" onclick="getReading()">
      <span id="btnText">Reveal My Reading ✦</span>
      <div class="loading-ring" id="loadingRing"></div>
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
  <div class="response-card" id="responseCard">
    <div class="response-header">
      <div class="response-planet" id="responsePlanet">🌙</div>
      <div>
        <div class="response-meta" id="responseMeta"></div>
        <div class="response-type" id="responseType">Your Reading</div>
      </div>
    </div>
    <div class="response-body" id="responseBody"></div>
    <div class="dasha-section" id="dashaSection" style="display:none;">
      <div class="dasha-title">🪐 Dasha Analysis</div>
      <div class="dasha-body" id="dashaBody"></div>
    </div>
  </div>
  <footer>Nakshatra AI · Powered by Gemini · For reflection, not prophecy</footer>
</div>
<script>
// STARFIELD
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = Array.from({length:180},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.4+0.2,a:Math.random(),speed:Math.random()*0.003+0.001})); }
function drawStars() { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.a+=s.speed;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,210,230,${0.2+0.6*Math.abs(Math.sin(s.a))})`;ctx.fill();}); requestAnimationFrame(drawStars); }
window.addEventListener('resize',resize); resize(); drawStars();

// STATE
var selectedType = 'General Life Reading';
var selectedLang = 'English';

document.getElementById('pillGroup').addEventListener('click', function(e) {
  if (!e.target.classList.contains('pill')) return;
  document.querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active'); });
  e.target.classList.add('active');
  selectedType = e.target.dataset.type;
});

document.getElementById('langGroup').addEventListener('click', function(e) {
  if (!e.target.classList.contains('lang-btn')) return;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
  e.target.classList.add('active');
  selectedLang = e.target.dataset.lang;
});

var planetEmojis = {'General Life Reading':'🌙','Career & Dharma':'☀️','Love & Relationships':'♀️','Health & Vitality':'🌿','Finance & Wealth':'♃','Spiritual Path':'🕉️'};

function fmt(t) {
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
}

async function askAI(prompt) {
  var response = await fetch('/api/reading', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: prompt })
  });
  var data = await response.json();
  if (!response.ok) throw new Error(data.error || 'API error');
  if (!data.text) throw new Error('No text in response');
  return data.text;
}

async function getReading() {
  var name = document.getElementById('name').value.trim();
  var dob = document.getElementById('dob').value;
  var tob = document.getElementById('tob').value;
  var pob = document.getElementById('pob').value.trim();
  var question = document.getElementById('question').value.trim();
  var includeDasha = document.getElementById('dashaToggle').checked;
  var errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  if (!name || !dob) {
    errorEl.textContent = 'Please enter your name and date of birth.';
    errorEl.style.display = 'block';
    return;
  }

  var btn = document.getElementById('readBtn');
  btn.disabled = true;
  document.getElementById('btnText').style.display = 'none';
  document.getElementById('loadingRing').style.display = 'block';

  var langMap = {
    'English': 'Respond in fluent poetic English.',
    'Hindi': 'पूरा जवाब हिंदी में दें — Devanagari script.',
    'Hinglish': 'Respond in Hinglish — natural mix of Hindi and English.',
    'Sanskrit-flavoured English': 'Respond in English with Sanskrit terms and shlokas.'
  };

  var readingPrompt = 'You are Nakshatra AI — a wise Vedic astrologer. ' + langMap[selectedLang] + '\nSeeker: ' + name + '\nDOB: ' + dob + '\nTime: ' + (tob||'noon') + '\nPlace: ' + (pob||'India') + '\nFocus: ' + selectedType + (question ? '\nQuestion: ' + question : '') + '\n\nGive a rich personal Vedic reading (280-350 words). Cover Nakshatra, Rashi, Lagna, key planets, strengths, challenges, guidance. Use **bold** for terms, *italics* for poetry.';

  var dashaPrompt = 'You are Nakshatra AI — Vedic Jyotish Dasha expert. ' + langMap[selectedLang] + '\nSeeker: ' + name + '\nDOB: ' + dob + '\nTime: ' + (tob||'noon') + '\nPlace: ' + (pob||'India') + '\nToday: ' + new Date().toISOString().split('T')[0] + '\n\nVimshottari Dasha analysis (220-280 words):\n1. Current Mahadasha — planet, dates, nature\n2. Current Antardasha — combined effect\n3. Life impacts now — career, relationships, health, finances\n4. Upcoming shift — next period and when\n5. Remedies — mantras or gemstones\n\nUse **bold** for planet names, *italics* for insights.';

  try {
    var readingText = await askAI(readingPrompt);
    document.getElementById('responsePlanet').textContent = planetEmojis[selectedType] || '🌙';
    document.getElementById('responseMeta').textContent = name + ' · ' + dob + (pob ? ' · ' + pob : '') + ' · ' + selectedLang;
    document.getElementById('responseType').textContent = selectedType;
    document.getElementById('responseBody').innerHTML = fmt(readingText);
    var card = document.getElementById('responseCard');
    card.style.display = 'block';

    if (includeDasha) {
      document.getElementById('dashaSection').style.display = 'block';
      document.getElementById('dashaBody').innerHTML = '<em style="color:var(--muted)">Calculating Dasha periods...</em>';
      var dashaText = await askAI(dashaPrompt);
      document.getElementById('dashaBody').innerHTML = fmt(dashaText);
    } else {
      document.getElementById('dashaSection').style.display = 'none';
    }
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(err) {
    errorEl.textContent = err.message || 'Something went wrong.';
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').style.display = 'inline';
    document.getElementById('loadingRing').style.display = 'none';
  }
}
</script>
</body>
</html>
